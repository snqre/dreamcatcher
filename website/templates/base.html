<!--

    Using Bootstrap v5.3 framework.

    ref: https://getbootstrap.com/

    ref: https://getbootstrap.com/docs/5.0/customize/css-variables/

-->


<!-- base.html -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <title>{% block title %}Dreamcatcher{% endblock %}</title>
        <style>
            :root {
                --tx: #ffffff;
                --txlgrey: #D3D3D3;
                --bg: #292F37;
            }

            * {
                padding: 0;
                margin: 0;
            }
            
            html {
                background-color: var(--bg);
                font-family: 'Courier New', Courier, monospace;
            }
        </style>
    </head>
    <body>
        <header>
            <!-- navbar
            
            The animation effect of this component is dependent on the
            prefers-reduced-motion media query.

            Use =>
                .navbar-brand for company, product, or project name.
                
                .navbar-nav for full-height and lightweight navigation.

                .navbar-toggler for use with collpase plugin.

                .navbar-text for adding vertically centered strings of text.

                .collapse .navbar-collapse for grouping and hiding navbar contents by a parent breakpoint.

                OPTIONAL .navbar-scroll to set a max-height and scroll expanded navbar content.
            
            ref: https://getbootstrap.com/docs/5.3/components/navbar/

            ref: https://getbootstrap.com/docs/5.0/layout/grid/

            -->
            <nav class="navbar sticky-top navbar-expand-lg" style="background-color: var(--bg);">
                <div class="container-fluid d-flex justify-content-between">

                    <!-- logo and name -->
                    <a class="navbar-brand text-white" href="#"> <!-- TODO: NOT SHOWING LOGO -->
                        <img src="{{ url_for("static", filename="png/logo.png")}} alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
                        Dreamcatcher
                    </a>
                    
                    <!-- burger bar init

                        When the screen is smaller the buger bar will appear.

                    -->
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <!-- options -->
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav">

                            <!-- home -->
                            <a class="nav-link active text-white" aria-current="page" href="#">Home</a>

                            <!-- whitepaper -->
                            <a class="nav-link disabled" style="color: var(--txlgrey);" aria-disabled="true">Whitepaper</a>

                            <!-- protocol -->
                            <a class="nav-link disabled" style="color: var(--txlgrey)" aria-disabled="true">Protocol</a>

                            <!-- governance -->
                            <a class="nav-link disabled" style="color: var(--txlgrey);" aria-disabled="true">Governance</a>

                            <!-- treasury -->
                            <a class="nav-link disabled" style="color: var(--txlgrey)" aria-disabled="true">Treasury</a>
                        </div>
                    </div>

                    <!-- launch dapp button -->
                    <form class="float-end">
                        <button class="btn btn-outline-light me-2 text-white rounded-pill " type="button">Launch dApp</button>
                    </form>
                </div>
            </nav>

        <!-- wrapper -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <!-- footer -->
        <!-- <footer>
            <p">&copy; 2023 Dreamcatcher Foundation. All rights reserved.</p>
        </footer>
        -->

        <!-- .js bootstrap import -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

        <!-- .js web3 import -->
        <script src="https://cdn.jsdelivr.net/npm/web3@3.0.0/dist/web3.min.js"></script>
        <script>

            /// user address
            let account;

            /// area to write supported contract's address and abi

            /**
             * a contract has two parameters required to connect to it
             * 
             * ABI
             * 
             * address
            */
            let tokenABI;
            let tokenAddress;

            const connectToContract = async (ABI, address) => {

                /// initialize contract
                window.web3 = await new Web3(window.ethereum);
                window.contract = await new window.web3.eth.Contract(ABI, address);
                
                /**
                 * will display if the connection has been successful
                 * 
                 * document.getElementById("showContractConnectionStatus").innerHTML = "Contract Connection: Successful";
                */
            }
            
            const connectToMetamask = async () => {
                if (window.ethereum !== "undefined") {
                    const accounts = await ethereum.request({ methods: "eth_requestAccounts"});
                    account = accounts[0];

                    /**
                     * will display account address
                     * 
                     * document.getElementById("showAccount").innerHTML = account;
                    */
                }
            }
            
        </script>
    </body>
</html>
