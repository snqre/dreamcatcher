<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link href="../static/scss/main.css" rel="stylesheet">
        <title>{{ pageName }}</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                color: white;
                transition: all 0.25s ease-out;
            }

            body {
                background-color: #fff;
                position: absolute;
                inset: 0;
                display: flex;
                place-content: center;
                align-items: center;
                overflow: hidden;
            }

            header {
                position: relative;
                left: 0;
                top: 0;
                width: 100vw;
                height: 100vh;
            }

            .intro {
                position: fixed;
                z-index: 1000;
                left: 0;
                top: 0;
                width: 100%;
                height: 100vh;
                background-color: #161616;
                transition: 1s
            }

            .logo-header {
                position: absolute;
                top: 40%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #ffffff;
            }

            .logo {
                position: relative;
                display: inline-block;
                bottom: -20px;
                opacity: 0;
            }

            .logo.active {
                bottom: 0;
                opacity: 1;
                transition: ease-in-out 0.50s;
            }

            .logo.fade {
                bottom: 150px;
                opacity: 0;
                transition: ease-in-out 0.50s;
            }
        </style>
        <style>
            .line {
                height: 1px;
                width: 100%;
                background: rgba(255,255,255,0.05);
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: center;
            }

            .pulse {
                position: absolute;
                width: 200px;
                height: 2px;
                border-radius: 100px;
                background: linear-gradient(to top, #fff, transparent);
                animation: drop 16s infinite;
            }

            @keyframes drop {
                0% {
                    left: -8000px;
                } 100% {
                    left: 8000px;
                }
            }
        </style>
        <style>
            .column {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .row {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
            }

            .heading {
                color: black;
                font-size: 4rem;
                pointer-events: none;
            }

            .sub-heading {
                color: black;
                font-size: 2rem;
                pointer-events: none;
            }

            .flex-1 {
                width: 100%;
                height: 100%;
                flex: 1;
            }

            .flex-2 {
                width: 100%;
                height: 100%;
                flex: 2;
            }

            .button-with-border {
                border: 2px solid #fff;
                color: white;
                padding: 1%;
                border-radius: 20px;
            }

            .button-with-border:hover {
                background: #fff;
                color: #161616;
                cursor: pointer;
            }

            .flicker-pattern-1-with-0000ms-delay {
                animation: flicker-pattern-1 2s 0.00s linear both;
            }

            .flicker-pattern-1-with-0100ms-delay {
                animation: flicker-pattern-1 2s 0.10s linear both;
            }

            .flicker-pattern-1-with-0200ms-delay {
                animation: flicker-pattern-1 2s 0.20s linear both;
            }

            .flicker-pattern-1-with-0300ms-delay {
                animation: flicker-pattern-1 2s 0.30s linear both;
            }

            .flicker-pattern-1-with-0400ms-delay {
                animation: flicker-pattern-1 2s 0.40s linear both;
            }

            .flicker-pattern-1-with-0500ms-delay {
                animation: flicker-pattern-1 2s 0.50s linear both;
            }

            .flicker-pattern-1-with-0600ms-delay {
                animation: flicker-pattern-1 2s 0.60s linear both;
            }

            .flicker-pattern-1-with-0700ms-delay {
                animation: flicker-pattern-1 2s 0.70s linear both;
            }

            .flicker-pattern-1-with-0800ms-delay {
                animation: flicker-pattern-1 2s 0.80s linear both;
            }

            .flicker-pattern-1-with-0900ms-delay {
                animation: flicker-pattern-1 2s 0.90s linear both;
            }

            .flicker-pattern-1-with-1000ms-delay {
                animation: flicker-pattern-1 2s 1.00s linear both;
            }






        </style>
    </head>
    <body>



        <div class='column'>
            <div class='row' style='width: 100%; height: 100%; flex: 6'>
                <div class='column' style='width: 100%; height: 100%; flex: 6'>
                    <div class='row heading flicker-pattern-1-with-0000ms-delay'>
                        Scaling Dreams, Crafting Possibilities
                    </div>
                    <div class='row sub-heading flicker-pattern-1-with-0100ms-delay'>
                        Deploy and manage infinitely scalable vaults in seconds
                    </div>
                    <div class='row button-30 flicker-pattern-1-with-0200ms-delay'>
                        Learn More
                    </div>
                </div>
                <div class='column' style='width: 100%; height: 100%; flex: 6'>
                    <!-- gutter right -->
                </div>
            </div>
            <div class='row' style='width: 100%; height: 100%; flex: 6'>
                <div class='column' style='width: 100%; height: 100%; flex: 6'>

                </div>
                <div class='column' style='width: 100%; height: 100%; flex: 6'>
                    Hellooooo
                </div>
            </div>


        </div>

        <script defer src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <script>
            let intro = document.querySelector('.intro');
            let logo = document.querySelector('.logo-header');
            let logoSpan = document.querySelectorAll('.logo');

            window.addEventListener('DOMContentLoaded', () => {
                setTimeout(() => {
                    logoSpan.forEach((span, index) => {
                        setTimeout(() => {
                            span.classList.add('active');
                        }, (index + 1) * 400)
                    });
                    setTimeout(() => {
                        logoSpan.forEach((span, index) => {
                            setTimeout(() => {
                                span.classList.remove('active');
                                span.classList.add('fade');
                            }, (index + 1) * 50)
                        })
                    }, 2000);
                    setTimeout(() => {
                        intro.style.top = '-100vh';
                    }, 2300);
                });
            });
        </script>
        <script>

        </script>
    </body>
</html>
